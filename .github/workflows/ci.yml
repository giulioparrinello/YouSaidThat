name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests (unit + integration + tlock e2e)
        run: npx vitest run

      - name: Build (client + server bundle)
        run: npm run build

      # Fails the pipeline if any high/critical vulnerability appears.
      # Known moderate/low residuals (opentimestamps/request chain) are accepted.
      - name: Dependency audit gate
        run: npm audit --audit-level=high
